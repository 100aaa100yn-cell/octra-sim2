<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オクトラ大陸の覇者 最大ダメージシミュレーター</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>オクトラ大陸の覇者 最大ダメージシミュレーター</h1>
      <p>精密版：枠別バフ上限、クリティカル、レベル補正、0.98〜1.02乱数対応</p>
    </div>
    <span class="version">v0.4.5</span>
  </header>

  <main class="layout">
    <section>
      <div class="box">
        <h2>8人編成</h2>
        <p class="hint">カードをクリックすると、下の攻撃設定がそのキャラクターに切り替わります。</p>

        <h3 class="front-title">前衛</h3>
        <div id="front-party" class="party-grid"></div>

        <h3 class="back-title">後衛</h3>
        <div id="back-party" class="party-grid"></div>
      </div>

      <div class="box">
        <h2>攻撃設定：<span id="selected-character-name">-</span></h2>

        <div class="effect-grid">
          <div class="effect-panel">
            <h3>キャラクター固有効果</h3>
            <div id="character-effects" class="effect-list"></div>
          </div>
          <div class="effect-panel">
            <h3>選択アビリティ効果</h3>
            <div id="skill-effects" class="effect-list"></div>
            <div id="skill-detail-panel" class="skill-detail-panel"></div>
          </div>
        </div>

        <label class="effect-toggle">
          <input id="apply-after-effects" type="checkbox">
          「行動後に付与」の技効果も今回の攻撃へ仮適用する
        </label>
        <p class="hint">通常はOFFです。次の攻撃を想定して比較するときだけONにしてください。</p>

        <div class="form-grid">
          <label>
            アビリティ
            <select id="skill-selector"></select>
          </label>

          <label>
            ブースト段階
            <select id="boost-selector">
              <option value="0">ブーストなし</option>
              <option value="1">ブースト1</option>
              <option value="2">ブースト2</option>
              <option value="3">ブーストMAX</option>
            </select>
          </label>

          <label>
            物攻補正
            <input id="patk-adjustment" type="number" value="0" step="1">
          </label>

          <label>
            属攻補正
            <input id="eatk-adjustment" type="number" value="0" step="1">
          </label>

          <label>
            攻撃バフ・バトアビ枠（%）
            <input id="battle-attack-buff" type="number" value="0" min="0" max="30" step="1">
          </label>

          <label>
            攻撃バフ・サポアビ/装備枠（%）
            <input id="support-attack-buff" type="number" value="0" min="0" max="30" step="1">
          </label>

          <label>
            ダメージUP・バトアビ枠（%）
            <input id="battle-damage-bonus" type="number" value="0" min="0" max="30" step="1">
          </label>

          <label>
            ダメージUP・サポアビ/装備枠（%）
            <input id="support-damage-bonus" type="number" value="0" min="0" max="30" step="1">
          </label>

          <label>
            レベル補正倍率
            <input id="level-multiplier" type="number" value="1" min="0.01" max="10" step="0.01">
          </label>

          <label class="check-row">
            <input id="is-critical" type="checkbox">
            クリティカル（×1.25）
          </label>

          <label>
            ダメージ上限加算
            <input id="cap-bonus" type="number" value="0" min="0" step="1000">
          </label>

          <label>
            乱数
            <select id="random-selector">
              <option value="1">平均（1.00）</option>
              <option value="1.02" selected>最大（1.02）</option>
              <option value="0.98">最小（0.98）</option>
            </select>
          </label>
        </div>

        <button id="calculate-button" class="primary-button">最大ダメージを計算</button>
        <button id="find-best-button" class="secondary-button">このキャラの最大アビリティを検索</button>
      </div>
    </section>

    <aside>
      <div class="box sticky-box">
        <h2>敵設定</h2>
        <div class="form-grid single-column">
          <label>
            敵HP
            <input id="enemy-hp" type="number" value="10000000" min="1" step="1000">
          </label>

          <label>
            物防
            <input id="enemy-pdef" type="number" value="200" min="0" step="1">
          </label>

          <label>
            属防
            <input id="enemy-edef" type="number" value="200" min="0" step="1">
          </label>

          <label>
            防御デバフ（%）
            <input id="defense-debuff" type="number" value="0" min="0" max="30" step="1">
          </label>

          <label>
            敵シールド（攻撃開始時）
            <input id="enemy-shield" type="number" value="4" min="0" step="1">
          </label>

          <label class="check-row">
            <input id="is-weakness" type="checkbox" checked>
            弱点を突く
          </label>

          <label class="check-row">
            <input id="is-broken" type="checkbox" checked>
            ブレイク状態
          </label>
        </div>

        <h2 class="result-heading">計算結果</h2>
        <div id="damage-result" class="result-panel">
          条件を設定して計算してください。
        </div>
      </div>
    </aside>
  </main>

  <script src="data/characters.js"></script>
  <script src="data/skills.js"></script>
  <script src="js/damage-calculator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
